    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="#101722" stroke="#ffb43a" stroke-width="3"/>
  <circle cx="60" cy="60" r="47" fill="none" stroke="#3ecfe0" stroke-width="1" stroke-dasharray="4 6" opacity="0.55"/>
